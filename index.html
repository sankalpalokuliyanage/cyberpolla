<!DOCTYPE html>
<html>

<head>
    <title>Cyber Polla Controller</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background: #050505;
            color: #00f2ff;
            font-family: sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #init-btn {
            padding: 20px 40px;
            font-size: 20px;
            background: #00f2ff;
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px #00f2ff;
        }

        #hit-btn {
            width: 65vw;
            height: 65vw;
            margin: 10px auto;
            border-radius: 50%;
            border: 6px solid #00f2ff;
            background: none;
            color: #00f2ff;
            font-size: 60px;
            font-weight: bold;
            text-shadow: 0 0 20px #00f2ff;
            box-shadow: inset 0 0 30px #00f2ff, 0 0 50px #00f2ff;
            cursor: pointer;
            display: none;
            -webkit-tap-highlight-color: transparent;
        }

        #hit-btn:active {
            background: #00f2ff;
            color: #000;
            transform: scale(0.9);
        }

        .info {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="info">Cyber Polla Sync</div>
    <button id="init-btn">START SYSTEM</button>
    <button id="hit-btn">HIT</button>
    <div id="stat" style="font-size: 14px; opacity: 0.6; margin-top: 20px;">Ready for Pilot</div>

    <script>
        const ably = new Ably.Realtime('4dSGiw.0ZZshA:FZapw8AsdkTKkYqvTTxjwBhq2pPVmia9qtNjrXxHlvk');
        const channel = ably.channels.get('cyber-stream');
        let lastStep = 0;
        let currentHeading = 0;

        window.addEventListener('deviceorientation', (e) => {
            if (e.alpha !== null) currentHeading = e.alpha;
        });

        document.getElementById('init-btn').onclick = () => {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') startSystem();
                });
            } else { startSystem(); }
        };

        function startSystem() {
            document.getElementById('init-btn').style.display = 'none';
            document.getElementById('hit-btn').style.display = 'block';
            window.addEventListener('devicemotion', (e) => {
                let acc = e.accelerationIncludingGravity;
                let mag = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
                if (mag > 12.0) {
                    let now = Date.now();
                    if (now - lastStep > 500) {
                        channel.publish('action', { type: 'STEP', heading: currentHeading });
                        lastStep = now;
                        if (navigator.vibrate) navigator.vibrate(40);
                    }
                }
            });
        }

        document.getElementById('hit-btn').onclick = () => {
            channel.publish('action', { type: 'HIT' });
            if (navigator.vibrate) navigator.vibrate(150);
        };

        channel.subscribe('feedback', (msg) => {
            if (msg.data === 'WIN') alert("TARGET DESTROYED!");
        });
    </script>
</body>

</html>
