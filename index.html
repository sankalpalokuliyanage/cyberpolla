<!DOCTYPE html>
<html>

<head>
    <title>කණා මුට්ටි Controller</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background: #5d4037;
            color: #ffeb3b;
            font-family: sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #init-btn {
            padding: 20px 40px;
            font-size: 22px;
            background: #ffeb3b;
            color: #5d4037;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        #hit-btn {
            width: 70vw;
            height: 70vw;
            margin: 10px auto;
            border-radius: 50%;
            border: 10px solid #ff9800;
            background: radial-gradient(circle, #8d6e63, #3e2723);
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            -webkit-tap-highlight-color: transparent;
        }

        #hit-btn:active {
            transform: scale(0.9);
            background: #3e2723;
        }

        .info {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="info">අවුරුදු කණා මුට්ටිය</div>
    <button id="init-btn">සම්බන්ධ වන්න</button>
    <button id="hit-btn">ගහන්න!</button>
    <div id="stat" style="margin-top: 20px; opacity: 0.7;">පද්ධතිය සක්‍රිය වෙමින්...</div>

    <script>
        const ably = new Ably.Realtime('4dSGiw.0ZZshA:FZapw8AsdkTKkYqvTTxjwBhq2pPVmia9qtNjrXxHlvk');
        const channel = ably.channels.get('cyber-stream');
        let lastStep = 0; let currentHeading = 0;

        window.addEventListener('deviceorientation', (e) => {
            if (e.alpha !== null) currentHeading = e.alpha;
        });

        document.getElementById('init-btn').onclick = () => {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') startSystem();
                });
            } else { startSystem(); }
        };

        function startSystem() {
            document.getElementById('init-btn').style.display = 'none';
            document.getElementById('hit-btn').style.display = 'block';
            document.getElementById('stat').innerText = "සූදානම්!";
            window.addEventListener('devicemotion', (e) => {
                let acc = e.accelerationIncludingGravity;
                let mag = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
                if (mag > 12.5) {
                    let now = Date.now();
                    if (now - lastStep > 500) {
                        channel.publish('action', { type: 'STEP', heading: currentHeading });
                        lastStep = now;
                        if (navigator.vibrate) navigator.vibrate(50);
                    }
                }
            });
        }

        document.getElementById('hit-btn').onclick = () => {
            channel.publish('action', { type: 'HIT' });
            if (navigator.vibrate) navigator.vibrate(200);
        };
    </script>
</body>

</html>
