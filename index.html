<!DOCTYPE html>
<html>

<head>
    <title>කණා මුට්ටි Controller v4</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background: #5d4037;
            color: #ffeb3b;
            font-family: sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #init-btn {
            padding: 20px 40px;
            font-size: 22px;
            background: #ffeb3b;
            color: #5d4037;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        #hit-btn {
            width: 70vw;
            height: 70vw;
            margin: 10px auto;
            border-radius: 50%;
            border: 10px solid #ff9800;
            background: radial-gradient(circle, #8d6e63, #3e2723);
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            display: none;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        #countdown-text {
            font-size: 80px;
            font-weight: bold;
            display: none;
        }

        .hint {
            font-size: 16px;
            margin-top: 15px;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="main-ui">
        <div class="info">අවුරුදු කණා මුට්ටිය</div><br>
        <button id="init-btn">ආරම්භ කරන්න</button>
    </div>
    <div id="countdown-text"></div>
    <button id="hit-btn">HIT</button>
    <div class="hint" id="hint-text">Shake to Move!</div>

    <script>
        const ably = new Ably.Realtime('4dSGiw.0ZZshA:FZapw8AsdkTKkYqvTTxjwBhq2pPVmia9qtNjrXxHlvk');
        const channel = ably.channels.get('cyber-stream');
        let lastMove = 0;

        document.getElementById('init-btn').onclick = () => {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') startCountdown();
                });
            } else { startCountdown(); }
        };

        function startCountdown() {
            // Dashboard එකට පණිවිඩය යවනවා කවුන්ට්ඩවුන් එක පටන් ගන්න කියලා
            channel.publish('action', { type: 'START_COUNTDOWN' });

            const initBtn = document.getElementById('init-btn');
            const countdownEl = document.getElementById('countdown-text');
            const infoEl = document.querySelector('.info');

            initBtn.style.display = 'none';
            infoEl.style.display = 'none';
            countdownEl.style.display = 'block';

            let count = 3;
            const timer = setInterval(() => {
                if (count > 0) {
                    countdownEl.innerText = count;
                    if (navigator.vibrate) navigator.vibrate(50);
                    count--;
                } else {
                    clearInterval(timer);
                    countdownEl.innerText = "GO!";
                    if (navigator.vibrate) navigator.vibrate(200);
                    setTimeout(() => {
                        countdownEl.style.display = 'none';
                        startControl();
                    }, 500);
                }
            }, 1000);
        }

        function startControl() {
            document.getElementById('hit-btn').style.display = 'block';
            window.addEventListener('devicemotion', (e) => {
                let acc = e.acceleration;
                if (!acc || !acc.x) return;
                let now = Date.now();
                if (now - lastMove < 400) return;
                let threshold = 5.0;
                let moveType = null;
                if (acc.x > threshold) moveType = 'LEFT';
                else if (acc.x < -threshold) moveType = 'RIGHT';
                else if (acc.y < -threshold) moveType = 'FORWARD';
                else if (acc.y > threshold) moveType = 'BACKWARD';
                if (moveType) {
                    channel.publish('action', { type: 'MOVE', direction: moveType });
                    lastMove = now;
                    document.getElementById('hint-text').innerText = "Moving: " + moveType;
                }
            });
        }

        document.getElementById('hit-btn').onclick = () => {
            channel.publish('action', { type: 'HIT' });
            if (navigator.vibrate) navigator.vibrate(200);
        };
    </script>
</body>

</html>
