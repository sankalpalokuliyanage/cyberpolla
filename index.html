<!DOCTYPE html>
<html>

<head>
    <title>Cyber Polla Controller Pro</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background: #1a1a1a;
            color: #deff9a;
            font-family: sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        input {
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #deff9a;
            width: 80%;
            font-size: 18px;
            margin-bottom: 20px;
            background: #333;
            color: #fff;
            text-align: center;
        }

        #init-btn {
            padding: 20px 40px;
            font-size: 22px;
            background: #deff9a;
            color: #1a1a1a;
            border: none;
            border-radius: 50px;
            font-weight: bold;
        }

        #hit-btn {
            width: 60vw;
            height: 60vw;
            margin: 20px auto;
            border-radius: 50%;
            border: 8px solid #deff9a;
            background: radial-gradient(circle, #444, #000);
            color: #deff9a;
            font-size: 40px;
            font-weight: bold;
            display: none;
            box-shadow: 0 0 20px #deff9a;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>

<body>
    <div id="setup-ui">
        <h2>CYBER POLLA</h2>
        <input type="text" id="player-name" placeholder="ඔබේ නම...">
        <br>
        <button id="init-btn">CONNECT</button>
    </div>

    <button id="hit-btn">HIT</button>
    <div id="status">Shake to Turn | Tilt to Move</div>

    <script>
        const ably = new Ably.Realtime('4dSGiw.0ZZshA:FZapw8AsdkTKkYqvTTxjwBhq2pPVmia9qtNjrXxHlvk');
        const channel = ably.channels.get('cyber-stream');
        let lastMove = 0;

        document.getElementById('init-btn').onclick = () => {
            const pName = document.getElementById('player-name').value.trim();
            if (!pName) return alert("නමක් ඇතුළත් කරන්න!");

            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') startApp(pName);
                });
            } else { startApp(pName); }
        };

        function startApp(name) {
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('hit-btn').style.display = 'block';
            channel.publish('action', { type: 'START_COUNTDOWN', name: name });
            startMotionLogic();
        }

        function startMotionLogic() {
            window.addEventListener('devicemotion', (e) => {
                let accWithG = e.accelerationIncludingGravity;
                let accPure = e.acceleration;
                if (!accWithG || !accPure) return;

                let now = Date.now();
                if (now - lastMove < 200) return;

                let moveType = null;
                const shakeThresh = 10.0;
                const tiltThresh = 3.0; // මෙතන අගය ඔයාට අවශ්‍ය විදිහට වෙනස් කරන්න

                // 1. SHAKE LOGIC (Turning)
                if (accPure.x > shakeThresh) moveType = 'TURN_LEFT';
                else if (accPure.x < -shakeThresh) moveType = 'TURN_RIGHT';

                // 2. TILT LOGIC (Moving)
                else if (accWithG.z > tiltThresh) moveType = 'FORWARD';
                else if (accWithG.z < -tiltThresh) moveType = 'BACKWARD';
                else if (accWithG.x > tiltThresh) moveType = 'LEFT';
                else if (accWithG.x < -tiltThresh) moveType = 'RIGHT';

                // 3. STOP LOGIC (Neutral Position)
                else {
                    moveType = 'STOP';
                }

                if (moveType) {
                    channel.publish('action', { type: 'MOVE', direction: moveType });
                    lastMove = now;
                }
            });
        }

        document.getElementById('hit-btn').onclick = () => {
            channel.publish('action', { type: 'HIT_REQUEST' });
        };
    </script>
</body>

</html>
