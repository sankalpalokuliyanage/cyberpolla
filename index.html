<!DOCTYPE html>
<html>

<head>
    <title>Cyber Polla Controller Pro</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+Sinhala:wght@700&display=swap');

        body {
            /* අවුරුදු රතු සහ තැඹිලි වර්ණ Cyberpunk gradient එකක් ලෙස */
            background: radial-gradient(circle at center, #3e2723 0%, #1a1a1a 100%);
            color: #deff9a;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* පසුබිමට අවුරුදු සැරසිලි වැනි රටාවක් */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#deff9a 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.05;
            z-index: -1;
        }

        #setup-ui {
            padding: 20px;
            animation: fadeIn 1s ease-out;
        }

        h2 {
            font-size: 2.5rem;
            color: #ff9800;
            /* අවුරුදු තැඹිලි */
            text-shadow: 0 0 15px #ff9800, 2px 2px #000;
            margin-bottom: 30px;
            font-family: 'Noto Sans Sinhala', 'Orbitron', sans-serif;
        }

        input {
            padding: 18px;
            border-radius: 15px;
            border: 3px solid #ff9800;
            width: 80%;
            font-size: 1.2rem;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            text-align: center;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 152, 0, 0.3);
        }

        #init-btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            background: #ff9800;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 152, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #init-btn:active {
            transform: scale(0.95);
        }

        #hit-btn {
            width: 70vw;
            height: 70vw;
            max-width: 300px;
            max-height: 300px;
            margin: 20px auto;
            border-radius: 50%;
            border: 12px solid #d32f2f;
            /* රතු මුට්ටියක වර්ණය */
            background: radial-gradient(circle, #ff5252, #7b1fa2);
            color: #fff;
            font-size: 3.5rem;
            font-weight: bold;
            display: none;
            box-shadow: 0 0 30px #d32f2f, inset 0 0 50px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }

        #status {
            margin-top: 30px;
            font-size: 1rem;
            color: #ffb74d;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid rgba(255, 152, 0, 0.2);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 20px #d32f2f;
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px #ff5252;
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 20px #d32f2f;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div id="setup-ui">
        <h2>CYBER පොල්ල</h2>
        <input type="text" id="player-name" placeholder="ඔබේ නම...">
        <br>
        <button id="init-btn">ආරම්භ කරන්න</button>
    </div>

    <button id="hit-btn">HIT</button>
    <div id="status">Shake: හැරවීමට | Tilt: ගමන් කිරීමට</div>

    <script>
        // ... (ඔයාගේ කලින් තිබ්බ functions ටික මෙතනට එලෙසම දාන්න)
        const ably = new Ably.Realtime('4dSGiw.0ZZshA:FZapw8AsdkTKkYqvTTxjwBhq2pPVmia9qtNjrXxHlvk');
        const channel = ably.channels.get('cyber-stream');
        let lastMove = 0;

        document.getElementById('init-btn').onclick = () => {
            const pName = document.getElementById('player-name').value.trim();
            if (!pName) return alert("නමක් ඇතුළත් කරන්න!");

            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') startApp(pName);
                });
            } else { startApp(pName); }
        };

        function startApp(name) {
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('hit-btn').style.display = 'block';
            channel.publish('action', { type: 'START_COUNTDOWN', name: name });
            startMotionLogic();
        }

        function startMotionLogic() {
            window.addEventListener('devicemotion', (e) => {
                let accWithG = e.accelerationIncludingGravity;
                let accPure = e.acceleration;
                if (!accWithG || !accPure) return;

                let now = Date.now();
                if (now - lastMove < 200) return;

                let moveType = null;
                const shakeThresh = 10.0;
                const tiltThresh = 3.0;

                if (accPure.x > shakeThresh) moveType = 'TURN_LEFT';
                else if (accPure.x < -shakeThresh) moveType = 'TURN_RIGHT';

                else if (accWithG.z > tiltThresh) moveType = 'FORWARD';
                else if (accWithG.z < -tiltThresh) moveType = 'BACKWARD';
                else if (accWithG.x > tiltThresh) moveType = 'LEFT';
                else if (accWithG.x < -tiltThresh) moveType = 'RIGHT';

                else {
                    moveType = 'STOP';
                }

                if (moveType) {
                    channel.publish('action', { type: 'MOVE', direction: moveType });
                    lastMove = now;
                }
            });
        }

        document.getElementById('hit-btn').onclick = () => {
            channel.publish('action', { type: 'HIT_REQUEST' });
        };
    </script>
</body>

</html>
