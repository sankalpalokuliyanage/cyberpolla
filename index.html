<!DOCTYPE html>
<html>

<head>
    <title>කණා මුට්ටි Controller v3</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background: #5d4037;
            color: #ffeb3b;
            font-family: sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #init-btn {
            padding: 20px 40px;
            font-size: 22px;
            background: #ffeb3b;
            color: #5d4037;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        #hit-btn {
            width: 70vw;
            height: 70vw;
            margin: 10px auto;
            border-radius: 50%;
            border: 10px solid #ff9800;
            background: radial-gradient(circle, #8d6e63, #3e2723);
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            display: none;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
        }

        .hint {
            font-size: 16px;
            margin-top: 15px;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="info">අවුරුදු කණා මුට්ටිය</div>
    <button id="init-btn">ආරම්භ කරන්න</button>
    <button id="hit-btn">HIT</button>
    <div class="hint" id="hint-text">Shake to Move!</div>

    <script>
        const ably = new Ably.Realtime('4dSGiw.0ZZshA:FZapw8AsdkTKkYqvTTxjwBhq2pPVmia9qtNjrXxHlvk');
        const channel = ably.channels.get('cyber-stream');
        let lastMove = 0;

        document.getElementById('init-btn').onclick = () => {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') startControl();
                });
            } else { startControl(); }
        };

        function startControl() {
            document.getElementById('init-btn').style.display = 'none';
            document.getElementById('hit-btn').style.display = 'block';

            window.addEventListener('devicemotion', (e) => {
                let acc = e.acceleration; // Gravity නැතිව
                if (!acc.x) return;

                let now = Date.now();
                if (now - lastMove < 400) return; // වේගය පාලනයට

                let threshold = 5.0; // ගැස්සීම හඳුනාගන්නා සීමාව
                let moveType = null;

                // X අක්ෂය (වමට/දකුණට)
                if (acc.x > threshold) moveType = 'LEFT';
                else if (acc.x < -threshold) moveType = 'RIGHT';

                // Y අක්ෂය (ඉදිරියට/පසුපසට - iPhone එක අල්ලාගෙන සිටින ආකාරය අනුව)
                else if (acc.y < -threshold) moveType = 'FORWARD';
                else if (acc.y > threshold) moveType = 'BACKWARD';

                if (moveType) {
                    channel.publish('action', { type: 'MOVE', direction: moveType });
                    lastMove = now;
                    if (navigator.vibrate) navigator.vibrate(40);
                    document.getElementById('hint-text').innerText = "Moving: " + moveType;
                }
            });
        }

        document.getElementById('hit-btn').onclick = () => {
            channel.publish('action', { type: 'HIT' });
            if (navigator.vibrate) navigator.vibrate(200);
        };
    </script>
</body>

</html>
