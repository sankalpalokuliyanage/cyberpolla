<!DOCTYPE html>
<html>

<head>
    <title>කණා මුට්ටි Controller Pro</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background: #5d4037;
            color: #ffeb3b;
            font-family: sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #setup-ui {
            padding: 20px;
        }

        input {
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #ff9800;
            width: 80%;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        #init-btn {
            padding: 20px 40px;
            font-size: 22px;
            background: #ffeb3b;
            color: #5d4037;
            border: none;
            border-radius: 50px;
            font-weight: bold;
        }

        #hit-btn {
            width: 70vw;
            height: 70vw;
            margin: 10px auto;
            border-radius: 50%;
            border: 10px solid #ff9800;
            background: radial-gradient(circle, #8d6e63, #3e2723);
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            display: none;
        }

        #countdown-text {
            font-size: 80px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>

<body>
    <div id="setup-ui">
        <h2 id="info-text">ඔබේ නම ඇතුළත් කරන්න</h2>
        <input type="text" id="player-name" placeholder="Name Here...">
        <br>
        <button id="init-btn">ආරම්භ කරන්න</button>
    </div>

    <div id="countdown-text"></div>
    <button id="hit-btn">HIT</button>

    <script>
        const ably = new Ably.Realtime('4dSGiw.0ZZshA:FZapw8AsdkTKkYqvTTxjwBhq2pPVmia9qtNjrXxHlvk');
        const channel = ably.channels.get('cyber-stream');
        let lastMove = 0;
        let pName = "";

        document.getElementById('init-btn').onclick = () => {
            pName = document.getElementById('player-name').value.trim();
            if (!pName) { alert("කරුණාකර නමක් ඇතුළත් කරන්න!"); return; }

            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') startSequence();
                });
            } else { startSequence(); }
        };

        function startSequence() {
            document.getElementById('setup-ui').style.display = 'none';
            // Dashboard එකට පණිවිඩය යවනවා නම සමඟ
            channel.publish('action', { type: 'START_COUNTDOWN', name: pName });

            const countdownEl = document.getElementById('countdown-text');
            countdownEl.style.display = 'block';

            let count = 3;
            const timer = setInterval(() => {
                if (count > 0) {
                    countdownEl.innerText = count;
                    count--;
                } else {
                    clearInterval(timer);
                    countdownEl.innerText = "GO!";
                    setTimeout(() => {
                        countdownEl.style.display = 'none';
                        document.getElementById('hit-btn').style.display = 'block';
                        startControl();
                    }, 500);
                }
            }, 1000);
        }

        function startControl() {
            window.addEventListener('devicemotion', (e) => {
                let acc = e.acceleration;
                if (!acc || !acc.x) return;
                let now = Date.now();
                if (now - lastMove < 400) return;
                let threshold = 5.0;
                let moveType = null;
                if (acc.x > threshold) moveType = 'LEFT';
                else if (acc.x < -threshold) moveType = 'RIGHT';
                else if (acc.y < -threshold) moveType = 'FORWARD';
                else if (acc.y > threshold) moveType = 'BACKWARD';
                if (moveType) {
                    channel.publish('action', { type: 'MOVE', direction: moveType });
                    lastMove = now;
                }
            });
        }

        document.getElementById('hit-btn').onclick = () => {
            channel.publish('action', { type: 'HIT_REQUEST' });
        };
    </script>
</body>

</html>
