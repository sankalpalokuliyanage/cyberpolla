<!DOCTYPE html>
<html>

<head>
    <title>Cyber Polla Controller</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background: #050505;
            color: #00f2ff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #init-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #00f2ff;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 0 20px #00f2ff;
        }

        #hit-btn {
            width: 60vw;
            height: 60vw;
            margin: 10px auto;
            border-radius: 50%;
            border: 5px solid #00f2ff;
            background: none;
            color: #00f2ff;
            font-size: 50px;
            font-weight: bold;
            text-shadow: 0 0 15px #00f2ff;
            box-shadow: inset 0 0 20px #00f2ff, 0 0 40px #00f2ff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            display: none;
        }

        /* ආරම්භයේදී සඟවා ඇත */

        #hit-btn:active {
            background: #00f2ff;
            color: #000;
            transform: scale(0.9);
        }

        .info {
            font-size: 18px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #debug {
            font-size: 10px;
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="info">Cyber Polla Sync</div>

    <button id="init-btn">INITIALIZE SYSTEM</button>

    <button id="hit-btn">HIT</button>

    <div id="stat" style="font-size: 12px; opacity: 0.5; margin-top: 20px;">Waiting for User...</div>
    <div id="debug">Motion: Off</div>

    <script>
        const ably = new Ably.Realtime('4dSGiw.0ZZshA:FZapw8AsdkTKkYqvTTxjwBhq2pPVmia9qtNjrXxHlvk');
        const channel = ably.channels.get('cyber-stream');
        let lastStep = 0;

        const initBtn = document.getElementById('init-btn');
        const hitBtn = document.getElementById('hit-btn');
        const stat = document.getElementById('stat');
        const debug = document.getElementById('debug');

        ably.connection.on('connected', () => {
            stat.innerText = "ABLY CONNECTED";
        });

        // සෙන්සර් අවසර ලබාගැනීමේ Logic එක
        initBtn.onclick = () => {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            startMotionDetection();
                        } else {
                            alert("Permission denied for sensors!");
                        }
                    })
                    .catch(console.error);
            } else {
                // Non-iOS devices
                startMotionDetection();
            }
        };

        function startMotionDetection() {
            initBtn.style.display = 'none';
            hitBtn.style.display = 'block';
            stat.innerText = "SYSTEMS ONLINE";

            window.addEventListener('devicemotion', (e) => {
                let acc = e.accelerationIncludingGravity;
                if (!acc) return;

                let mag = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
                debug.innerText = "Motion: " + mag.toFixed(2);

                if (mag > 11.5) { // ඇවිදින විට හෝ වනන විට Detect වන සීමාව
                    let now = Date.now();
                    if (now - lastStep > 500) { // තත්පර භාගයකට වරක් පමණක් STEP එකක් ගනී
                        channel.publish('action', { type: 'STEP' });
                        lastStep = now;
                        if (navigator.vibrate) navigator.vibrate(30);
                    }
                }
            });
        }

        // HIT Button Logic
        hitBtn.onclick = () => {
            channel.publish('action', { type: 'HIT' });
            if (navigator.vibrate) navigator.vibrate(100);
        };

        // ජයග්‍රහණයකදී හයියෙන් Vibrate වීම
        channel.subscribe('feedback', (msg) => {
            if (msg.data === 'WIN' && navigator.vibrate) {
                navigator.vibrate([500, 100, 500, 100, 500]);
            }
        });
    </script>
</body>

</html>
