<!DOCTYPE html>
<html>

<head>
    <title>Cyber Polla Controller</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background: #050505;
            color: #00f2ff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #hit-btn {
            width: 70vw;
            height: 70vw;
            margin: 20px auto;
            border-radius: 50%;
            border: 5px solid #00f2ff;
            background: none;
            color: #00f2ff;
            font-size: 50px;
            font-weight: bold;
            text-shadow: 0 0 15px #00f2ff;
            box-shadow: inset 0 0 20px #00f2ff, 0 0 40px #00f2ff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #hit-btn:active {
            background: #00f2ff;
            color: #000;
            transform: scale(0.9);
        }

        .info {
            font-size: 18px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>
    <div class="info">Cyber Polla Sync</div>
    <button id="hit-btn">HIT</button>
    <div id="stat" style="font-size: 12px; opacity: 0.5; margin-top: 20px;">Connecting...</div>

    <script>
        const ably = new Ably.Realtime('4dSGiw.0ZZshA:FZapw8AsdkTKkYqvTTxjwBhq2pPVmia9qtNjrXxHlvk');
        const channel = ably.channels.get('cyber-stream');

        ably.connection.on('connected', () => {
            document.getElementById('stat').innerText = "SYSTEMS ONLINE";
        });

        // HIT Button Logic
        document.getElementById('hit-btn').onclick = () => {
            channel.publish('action', { type: 'HIT' });
            if (navigator.vibrate) navigator.vibrate(100);
        };

        // Step Detection (ඇවිදීම මැනීම)
        let lastStep = 0;
        window.addEventListener('devicemotion', (e) => {
            let acc = e.accelerationIncludingGravity;
            let mag = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
            if (mag > 13.0) { // ගැස්සෙන විට පියවරක් ලෙස ගනී
                let now = Date.now();
                if (now - lastStep > 500) {
                    channel.publish('action', { type: 'STEP' });
                    lastStep = now;
                    if (navigator.vibrate) navigator.vibrate(30);
                }
            }
        });
    </script>
</body>

</html>
