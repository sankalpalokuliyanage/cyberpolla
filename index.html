<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cyber Polla Controller Pro</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --neon-green: #deff9a;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.1);
            --neon-glow: 0 0 15px rgba(222, 255, 154, 0.4);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a2a0a 0%, #0a0a0a 100%);
            color: var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        /* --- SETUP UI --- */
        #setup-ui {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 20px;
            border: 1px solid rgba(222, 255, 154, 0.3);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        h2 {
            letter-spacing: 5px;
            margin: 0 0 30px 0;
            text-shadow: 0 0 10px var(--neon-green);
            font-size: 1.8rem;
        }

        input {
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--neon-green);
            width: 100%;
            font-size: 16px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus {
            box-shadow: var(--neon-glow);
        }

        #init-btn {
            padding: 18px 45px;
            font-size: 18px;
            background: var(--neon-green);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(222, 255, 154, 0.4);
            transition: transform 0.1s ease;
            width: 100%;
            text-transform: uppercase;
        }

        #init-btn:active {
            transform: scale(0.95);
        }

        /* --- STRIKE BUTTON --- */
        #hit-btn {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid var(--neon-green);
            background: radial-gradient(circle, #2a3a1a, #000);
            color: var(--neon-green);
            font-size: 32px;
            font-weight: bold;
            display: none;
            box-shadow: 0 0 40px rgba(222, 255, 154, 0.2), inset 0 0 20px rgba(222, 255, 154, 0.2);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            animation: pulse 2s infinite;
            outline: none;
            margin: 0 auto;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 20px rgba(222, 255, 154, 0.2);
            }

            50% {
                box-shadow: 0 0 50px rgba(222, 255, 154, 0.5);
            }

            100% {
                box-shadow: 0 0 20px rgba(222, 255, 154, 0.2);
            }
        }

        /* --- STATUS & CONTROLS --- */
        #status-container {
            margin-top: 20px;
            display: none;
            width: 100%;
            max-width: 400px;
        }

        #status {
            font-size: 12px;
            color: rgba(222, 255, 154, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .hint {
            font-size: 10px;
            margin-bottom: 20px;
            color: #777;
        }

        .controls-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
        }

        .control-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            font-size: 10px;
            color: rgba(222, 255, 154, 0.8);
            border-left: 3px solid var(--neon-green);
            text-align: left;
        }

        .key {
            color: var(--neon-green);
            font-weight: bold;
            font-size: 12px;
            margin-right: 5px;
        }

        /* --- CREDITS UI --- */
        #ui-credits {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            width: 90%;
            max-width: 400px;
            z-index: 5;
        }

        .slsa-logo-wrapper {
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(222, 255, 154, 0.3);
            overflow: hidden;
            flex-shrink: 0;
        }

        .credits-info {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 10px;
            border-left: 4px solid var(--neon-green);
            text-align: left;
            flex-grow: 1;
        }

        .credits-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--neon-green);
            text-transform: uppercase;
            margin: 0;
        }

        .credits-uni {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
        }
    </style>
</head>

<body>
    <div id="setup-ui">
        <h2>CYBER POLLA</h2>
        <input type="text" id="player-name" placeholder="ENTER YOUR NAME">
        <br>
        <button id="init-btn">INITIALIZE</button>
    </div>

    <button id="hit-btn">STRIKE</button>

    <div id="status-container">
        <div id="status">GYRO-STABILIZED: ACTIVE</div>
        <div class="hint">Tilt to Slide | Shake to Rotate</div>
        <div class="controls-list">
            <div class="control-item"><span class="key">⇧</span> TILT TO FORWARD</div>
            <div class="control-item"><span class="key">⇊</span> TILT TO BACKWARD</div>
            <div class="control-item"><span class="key">⇖</span> TILT LEFT</div>
            <div class="control-item"><span class="key">⇗</span> TILT RIGHT</div>
            <div class="control-item"><span class="key">↺</span> SHAKE LEFT</div>
            <div class="control-item"><span class="key">↻</span> SHAKE RIGHT</div>
            <div class="control-item"><span class="key">⚡</span> STRIKE</div>
        </div>
    </div>

    <div id="ui-credits">
        <div class="slsa-logo-wrapper">
            <img src="slsa.jpeg" alt="SLSA Logo" style="width: 100%; height: auto;">
        </div>
        <div class="credits-info">
            <div class="credits-name">Sankalpa Lokuliyanage</div>
            <div class="credits-uni">Kyungpook National University (KNU)</div>
        </div>
    </div>

    <script>
        const ably = new Ably.Realtime('4dSGiw.0ZZshA:FZapw8AsdkTKkYqvTTxjwBhq2pPVmia9qtNjrXxHlvk');
        const channel = ably.channels.get('cyber-stream');
        let lastMove = 0;

        document.getElementById('init-btn').onclick = () => {
            const pName = document.getElementById('player-name').value.trim();
            if (!pName) return alert("ACCESS DENIED: NAME REQUIRED");

            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') startApp(pName);
                });
            } else {
                startApp(pName);
            }
        };

        function startApp(name) {
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('hit-btn').style.display = 'block';
            document.getElementById('status-container').style.display = 'block';
            channel.publish('action', { type: 'START_COUNTDOWN', name: name });
            startMotionLogic();
        }

        function startMotionLogic() {
            window.addEventListener('devicemotion', (e) => {
                let accWithG = e.accelerationIncludingGravity;
                let accPure = e.acceleration;
                if (!accWithG || !accPure) return;

                let now = Date.now();
                if (now - lastMove < 200) return;

                let moveType = null;
                const shakeThresh = 10.0;
                const tiltThresh = 3.0;

                // 1. SHAKE LOGIC (Turning)
                if (accPure.x > shakeThresh) moveType = 'TURN_LEFT';
                else if (accPure.x < -shakeThresh) moveType = 'TURN_RIGHT';

                // 2. TILT LOGIC (Moving)
                else if (accWithG.z > tiltThresh) moveType = 'FORWARD';
                else if (accWithG.z < -tiltThresh) moveType = 'BACKWARD';
                else if (accWithG.x > tiltThresh) moveType = 'LEFT';
                else if (accWithG.x < -tiltThresh) moveType = 'RIGHT';

                // 3. STOP LOGIC
                else {
                    moveType = 'STOP';
                }

                if (moveType) {
                    channel.publish('action', { type: 'MOVE', direction: moveType });
                    lastMove = now;
                }
            });
        }

        document.getElementById('hit-btn').onclick = () => {
            if (navigator.vibrate) navigator.vibrate(100);
            channel.publish('action', { type: 'HIT_REQUEST' });
        };
    </script>
</body>

</html>
